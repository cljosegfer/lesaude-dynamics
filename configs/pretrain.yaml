defaults:
  - data
  - _self_

embedding_dim: 256
action_dim: 76
predictor_hidden_dim: 512
# SIGReg weight λ — tune so pred_loss and reg_loss have a ~1:1 to 1:3 gradient magnitude ratio
lambda_reg: 5.0e-3
n_slices: 1024
t_max: 3.0
n_points: 17

batch_size: 1024
num_workers: 4
# Aggressive LR stable for the dynamics task (paper Appendix B)
lr: 1.0e-2
weight_decay: 1.0e-2
max_epochs: 100
seed: 42

wandb_project: lesaude-pretrain
use_wandb: true
ckpt_path: checkpoints/pretrain_.ckpt

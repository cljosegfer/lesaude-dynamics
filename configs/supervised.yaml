seed: 42
wandb_project: lesaude-supervised
use_wandb: true
ckpt_path: checkpoints/supervised_.ckpt

evaluate:
  num_workers: 4
  n_bootstrap: 1000
  seed: 0
  mode: triage  # triage | monitoring
defaults:
  - data
  - _self_

embedding_dim: 256
action_dim: 76
predictor_hidden_dim: 512
# SIGReg weight λ — tune so pred_loss and reg_loss have a ~1:1 to 1:3 gradient magnitude ratio
lambda_reg: 2.0e-3
n_slices: 1024
t_max: 3.0
n_points: 17

batch_size: 1024
num_workers: 4
lr: 1.0e-2
weight_decay: 1.0e-2
max_epochs: 100
seed: 42

# cross_stay pairs only: last ECG of stay k → first ECG of stay k+1
pair_types: [cross_stay]

# Upweight positive class in BCE to counter label sparsity.
# onset ≈ 0.693/0.015 ≈ 46, resolution ≈ 0.693/0.035 ≈ 20 (derived from loss collapse values).
onset_pos_weight: 46.0
resolution_pos_weight: 20.0

wandb_project: lesaude-inverse
use_wandb: true
ckpt_path: checkpoints/inverse_.ckpt

evaluate:
  n_bootstrap: 1000
  seed: 42
